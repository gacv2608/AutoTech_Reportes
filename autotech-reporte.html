<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="AutoTech">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c18">
<title>AutoTech — Reporte</title>
<style>
/* ── TOKENS ───────────────────────────────────────── */
:root {
  --bg: #080c18;
  --surface: #0f1626;
  --surface2: #0b1020;
  --border: #1e2a3a;
  --text: #e4e9f0;
  --muted: #4a5a6a;
  --accent: #00c4d8;
  --danger: #dc2626;
}

/* ── RESET ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

input, textarea, button { font-family: inherit; }

/* ── HEADER ───────────────────────────────────────── */
.app-header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 13px 16px;
  padding-top: max(13px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
}
.brand { font-weight: 900; font-size: 16px; letter-spacing: 3px; color: #fff; }
.brand .tech { color: var(--accent); }
.folio-tag { font-size: 11px; color: var(--muted); }
.folio-tag strong { color: var(--accent); font-family: 'Courier New', monospace; }

/* ── SCROLL AREA ──────────────────────────────────── */
.scroll-area {
  max-width: 640px; margin: 0 auto;
  padding: 14px 13px 110px;
}

/* ── CARD ─────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 15px;
  margin-bottom: 12px;
}

/* ── SECTION TITLE ────────────────────────────────── */
.sec-title {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.sec-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: var(--bg);
  font-size: 11px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sec-lbl {
  font-size: 10.5px; font-weight: 800;
  color: #fff; text-transform: uppercase; letter-spacing: 0.16em;
}

/* ── FIELD ────────────────────────────────────────── */
.field { margin-bottom: 11px; }
.field label {
  display: block; font-size: 10px; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.12em; margin-bottom: 5px;
}
.text-input, .textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  font-size: 16px; /* prevents iOS auto-zoom */
  color: var(--text);
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
  appearance: none;
}
.text-input:focus, .textarea:focus { border-color: var(--accent); }
.textarea { resize: none; }

/* ── GRID ─────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 11px; }

/* ── EVIDENCE ─────────────────────────────────────── */
.ev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.ev-slot {
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  background: var(--surface2);
}
.ev-photo {
  height: 100px; position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted);
  transition: color .15s; gap: 4px;
  user-select: none; -webkit-user-select: none;
}
.ev-photo:active { color: var(--accent); }
.ev-photo img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}
.ev-photo-caption { font-size: 11px; position: relative; z-index: 1; }
.ev-photo svg { position: relative; z-index: 1; opacity: .45; }
.ev-remove {
  position: absolute; top: 6px; right: 6px; z-index: 2;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--danger); color: #fff;
  border: none; cursor: pointer;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.ev-file { display: none; }
.ev-label-wrap { padding: 6px 7px; background: var(--bg); }
.ev-label-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 8px;
  font-size: 11px; color: var(--text);
  outline: none;
}
.ev-label-input:focus { border-color: var(--accent); }

/* ── PROCEDURES ───────────────────────────────────── */
.proc-row {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 8px;
}
.proc-num {
  font-size: 12px; font-weight: 700;
  color: var(--accent); width: 18px;
  text-align: center; flex-shrink: 0;
}
.proc-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 12px;
  font-size: 16px; color: var(--text);
  outline: none; transition: border-color .15s;
  -webkit-appearance: none;
}
.proc-input:focus { border-color: var(--accent); }
.btn-del {
  width: 26px; height: 26px; flex-shrink: 0;
  background: none; border: none;
  color: var(--muted); font-size: 14px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.btn-add {
  background: none; border: none; cursor: pointer;
  color: var(--accent); font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 4px;
  padding: 6px 0; margin-top: 2px;
}
.btn-add .plus { font-size: 18px; line-height: 1; }

/* ── LINE ITEMS ───────────────────────────────────── */
.li-header {
  display: grid;
  grid-template-columns: 1fr 50px 88px 26px;
  gap: 6px; margin-bottom: 5px;
}
.li-header span {
  font-size: 10px; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.1em;
}
.li-row {
  display: grid;
  grid-template-columns: 1fr 50px 88px 26px;
  gap: 6px; margin-bottom: 6px; align-items: center;
}
.li-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 10px;
  font-size: 14px; color: var(--text);
  outline: none; width: 100%;
  -webkit-appearance: none;
  transition: border-color .15s;
}
.li-input:focus { border-color: var(--accent); }
.li-input.c { text-align: center; }
.li-input.r { text-align: right; }
.total-row {
  display: flex; justify-content: space-between;
  align-items: center;
  padding: 11px 0 0; margin-top: 8px;
  border-top: 1px solid var(--border);
}
.total-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.total-amount { font-size: 18px; font-weight: 900; color: var(--accent); font-family: 'Courier New', monospace; }

/* ── CTA BAR ──────────────────────────────────────── */
.cta-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
}
.btn-generate {
  width: 100%; max-width: 640px;
  display: block; margin: 0 auto;
  padding: 15px;
  background: linear-gradient(135deg, #00c4d8, #0099b0);
  color: var(--bg); font-weight: 900;
  font-size: 13px; letter-spacing: .2em;
  text-transform: uppercase; border: none;
  border-radius: 14px; cursor: pointer;
  transition: filter .15s;
}
.btn-generate:active { filter: brightness(.85); }

/* ── PREVIEW CONTROLS ─────────────────────────────── */
.preview-bar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 11px 14px;
  padding-top: max(11px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
}
.btn-back {
  background: none; border: none;
  color: #9ca3af; font-size: 13px;
  font-weight: 600; cursor: pointer; padding: 4px 0;
}
.preview-folio { font-size: 11px; color: var(--muted); font-family: monospace; }
.btn-print {
  background: linear-gradient(135deg, #00c4d8, #0099b0);
  color: var(--bg); border: none; border-radius: 10px;
  padding: 9px 15px; font-size: 12px; font-weight: 900;
  letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
}

/* ── DOCUMENT BACKGROUND ──────────────────────────── */
.doc-bg {
  background: #b8bcc4;
  min-height: calc(100vh - 50px);
  padding: 20px 10px 40px;
  display: flex; flex-direction: column; align-items: center;
}

/* ── DOCUMENT ─────────────────────────────────────── */
.doc {
  background: white; width: 100%; max-width: 780px;
  padding: 34px 38px 42px;
  font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 10.5px; color: #1a1a1a; line-height: 1.45;
  box-shadow: 0 4px 28px rgba(0,0,0,.22);
}
.doc-logo { text-align: center; margin-bottom: 14px; }
.doc-brand-name {
  font-size: 24px; font-weight: 900;
  letter-spacing: 4.5px; line-height: 1; margin-top: 6px;
}
.doc-brand-name .t { color: #00b4cc; }
.doc-tagline {
  font-size: 8.5px; color: #777;
  letter-spacing: 2.5px; margin-top: 5px; font-weight: 600;
}
.doc-title {
  background: #3e3e3e; color: white;
  text-align: center; padding: 8px 12px;
  font-weight: 700; font-size: 12.5px;
  letter-spacing: 1.5px; margin-bottom: 9px;
}
.doc-folio {
  text-align: right; font-size: 8.5px;
  color: #888; margin-bottom: 16px; font-weight: 500;
}
.doc-sec {
  font-weight: 700; font-size: 9.5px;
  border-bottom: 1.5px solid #222;
  padding-bottom: 3px; margin-bottom: 8px;
  letter-spacing: .5px; text-transform: uppercase;
}
.doc-block { margin-bottom: 14px; }
.doc-grid2 {
  display: grid; grid-template-columns: 1fr 1fr;
  row-gap: 4px; column-gap: 22px; font-size: 10.5px;
}
.doc-grid2 .lbl { color: #666; }
.ev-doc-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 7px;
  margin-top: 10px;
}
.ev-doc-slot { border: 1px solid #d4d4d4; overflow: hidden; }
.ev-doc-head {
  background: #3e3e3e; color: white;
  font-size: 7.2px; font-weight: 700;
  padding: 4px 7px; text-align: center;
  letter-spacing: .7px; text-transform: uppercase;
}
.ev-doc-img { width: 100%; height: 118px; object-fit: cover; display: block; }
.ev-doc-empty {
  height: 108px; background: #f7f7f7;
  display: flex; align-items: center; justify-content: center;
  color: #bbb; font-size: 8.5px; font-style: italic;
}
.doc-table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
.doc-table th {
  background: #3e3e3e; color: white;
  padding: 6px 9px; font-weight: 700; letter-spacing: .3px;
}
.doc-table td { padding: 5px 9px; border-bottom: 1px solid #ececec; }
.doc-total td {
  background: #1a6b8a; color: white; font-weight: 900;
  font-size: 11.5px; border-bottom: none;
}
.doc-sig {
  display: flex; justify-content: space-between;
  align-items: flex-end; margin-top: 10px;
}
.sig-line { border-bottom: 1px solid #333; margin-bottom: 5px; }
.sig-cap { font-size: 8px; color: #888; }

/* ── PRINT ────────────────────────────────────────── */
@media print {
  .no-print, .preview-bar { display: none !important; }
  body { background: white; }
  .doc-bg { background: white; padding: 0; min-height: unset; display: block; }
  .doc { max-width: 100%; box-shadow: none; padding: 18px 22px; }
  @page { size: A4; margin: 0.6cm; }
}
</style>
</head>
<body>

<!-- ═══════════════ EDIT VIEW ═══════════════ -->
<div id="edit-view">
  <header class="app-header no-print">
    <div class="brand">AUTO<span class="tech">TECH</span></div>
    <div class="folio-tag">Folio <strong id="folio-display">#1000</strong></div>
  </header>

  <div class="scroll-area">

    <!-- S1 -->
    <div class="card">
      <div class="sec-title">
        <div class="sec-num">1</div>
        <div class="sec-lbl">Datos del Vehículo y Cliente</div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label>Nombre del Cliente</label>
          <input class="text-input" id="f-client" type="text" placeholder="Juan Pérez" autocomplete="off">
        </div>
        <div class="field">
          <label>Teléfono / Contacto</label>
          <input class="text-input" id="f-contact" type="tel" placeholder="+52 834 000 0000">
        </div>
        <div class="field">
          <label>Marca</label>
          <input class="text-input" id="f-brand" type="text" placeholder="Volkswagen" autocomplete="off">
        </div>
        <div class="field">
          <label>Modelo</label>
          <input class="text-input" id="f-model" type="text" placeholder="Golf GTI" autocomplete="off">
        </div>
        <div class="field">
          <label>Año</label>
          <input class="text-input" id="f-year" type="text" placeholder="2023" maxlength="4">
        </div>
        <div class="field">
          <label>VIN / N° de Serie</label>
          <input class="text-input" id="f-vin" type="text" placeholder="WVWZZZ..." autocomplete="off">
        </div>
      </div>
      <div class="field" style="margin-bottom:0; max-width:200px">
        <label>Fecha del Reporte</label>
        <input class="text-input" id="f-date" type="text">
      </div>
    </div>

    <!-- S2 -->
    <div class="card">
      <div class="sec-title">
        <div class="sec-num">2</div>
        <div class="sec-lbl">Diagnóstico Técnico &amp; Evidencias</div>
      </div>
      <div class="field">
        <label>Descripción del Diagnóstico</label>
        <textarea class="textarea" id="f-diag" rows="4"
          placeholder="Describe los hallazgos: códigos de falla, módulos con errores, estado general del vehículo..."></textarea>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Fotografías de Evidencia</label>
        <div class="ev-grid" id="ev-grid"></div>
      </div>
    </div>

    <!-- S3 -->
    <div class="card">
      <div class="sec-title">
        <div class="sec-num">3</div>
        <div class="sec-lbl">Procedimientos Necesarios</div>
      </div>
      <div id="proc-list"></div>
      <button class="btn-add" onclick="addProc()">
        <span class="plus">+</span> Agregar procedimiento
      </button>
    </div>

    <!-- S4 -->
    <div class="card">
      <div class="sec-title">
        <div class="sec-num">4</div>
        <div class="sec-lbl">Cotización de Reparación</div>
      </div>
      <div class="li-header">
        <span>Descripción</span>
        <span style="text-align:center">Cant.</span>
        <span style="text-align:right">P. Unitario</span>
        <span></span>
      </div>
      <div id="li-list"></div>
      <div class="total-row">
        <span class="total-label">Total General</span>
        <span class="total-amount" id="running-total">$0.00</span>
      </div>
      <button class="btn-add" style="margin-top:10px" onclick="addLI()">
        <span class="plus">+</span> Agregar concepto
      </button>
    </div>

    <!-- S5 -->
    <div class="card">
      <div class="sec-title">
        <div class="sec-num">5</div>
        <div class="sec-lbl">Resumen de Garantía</div>
      </div>
      <textarea class="textarea" id="f-warranty" rows="3">90 días en mano de obra especializada. 30 días en componentes instalados. La garantía no cubre daños por mal uso, modificaciones no autorizadas ni fallas eléctricas de origen externo.</textarea>
    </div>

  </div><!-- /scroll-area -->

  <div class="cta-bar no-print">
    <button class="btn-generate" onclick="generateReport()">Generar Reporte</button>
  </div>
</div><!-- /edit-view -->


<!-- ═══════════════ PREVIEW VIEW ═══════════════ -->
<div id="preview-view" style="display:none">
  <div class="preview-bar no-print">
    <button class="btn-back" onclick="backToEdit()">← Editar</button>
    <span class="preview-folio" id="preview-folio"></span>
    <button class="btn-print" onclick="window.print()">🖨 Imprimir / PDF</button>
  </div>
  <div class="doc-bg">
    <div class="doc" id="doc-out"></div>
  </div>
</div>


<script>
// ── STATE ─────────────────────────────────────────────
const evImages = [null, null, null, null];
const evLabels = [
  'ESCANEO ELECTRÓNICO - CÓDIGOS DE FALLA',
  'COMPONENTE DAÑADO - MÓDULO DE CONTROL',
  'VERIFICACIÓN DE CABLEADO - RESISTENCIA',
  'DIAGNÓSTICO ADICIONAL'
];
let folio = (() => {
  try { return parseInt(localStorage.getItem('at_folio') || '999'); }
  catch { return 999; }
})();

// ── INIT ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const d = String(now.getDate()).padStart(2,'0');
  const m = String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('f-date').value = `${d}/${m}/${now.getFullYear()}`;
  document.getElementById('folio-display').textContent = '#' + String(folio+1).padStart(4,'0');
  buildEvGrid();
  buildProcList();
  buildLIList();
});

// ── EVIDENCE ──────────────────────────────────────────
function buildEvGrid() {
  const grid = document.getElementById('ev-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    slot.className = 'ev-slot';

    // Photo zone
    const photo = document.createElement('div');
    photo.className = 'ev-photo';
    photo.onclick = () => document.getElementById('ev-file-'+i).click();

    if (evImages[i]) {
      const img = document.createElement('img');
      img.src = evImages[i];
      photo.appendChild(img);
      const btn = document.createElement('button');
      btn.className = 'ev-remove';
      btn.textContent = '×';
      btn.onclick = (e) => { e.stopPropagation(); evImages[i] = null; buildEvGrid(); };
      photo.appendChild(btn);
    } else {
      photo.innerHTML = `
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          style="opacity:.4; pointer-events:none">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8
            a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span class="ev-photo-caption" style="opacity:.45">Subir foto</span>`;
    }

    // Hidden file input
    const fi = document.createElement('input');
    fi.type = 'file'; fi.accept = 'image/*';
    fi.className = 'ev-file'; fi.id = 'ev-file-'+i;
    fi.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        // Resize before storing
        resizeImage(ev.target.result, 1200, 900).then(resized => {
          evImages[i] = resized;
          buildEvGrid();
        });
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    };

    // Label input
    const wrap = document.createElement('div');
    wrap.className = 'ev-label-wrap';
    const li = document.createElement('input');
    li.className = 'ev-label-input';
    li.type = 'text';
    li.value = evLabels[i];
    li.placeholder = 'Título de evidencia';
    li.oninput = () => { evLabels[i] = li.value; };
    wrap.appendChild(li);

    slot.appendChild(photo);
    slot.appendChild(fi);
    slot.appendChild(wrap);
    grid.appendChild(slot);
  }
}

// ── IMAGE RESIZE ──────────────────────────────────────
function resizeImage(dataUrl, maxW, maxH) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.82));
    };
    img.src = dataUrl;
  });
}

// ── PROCEDURES ────────────────────────────────────────
function buildProcList() {
  const list = document.getElementById('proc-list');
  const rows = list.querySelectorAll('.proc-row');
  const count = rows.length || 1;
  if (rows.length === 0) { list.innerHTML = ''; addProc(false); }
}

function addProc(focus = true) {
  const list = document.getElementById('proc-list');
  const idx = list.querySelectorAll('.proc-row').length;
  const row = document.createElement('div');
  row.className = 'proc-row';
  row.innerHTML = `
    <span class="proc-num">${idx + 1}</span>
    <input class="proc-input" type="text" placeholder="Descripción del procedimiento...">
    <button class="btn-del" onclick="removeProc(this)" title="Eliminar">✕</button>`;
  list.appendChild(row);
  if (focus) row.querySelector('input').focus();
  renum();
}

function removeProc(btn) {
  const list = document.getElementById('proc-list');
  if (list.querySelectorAll('.proc-row').length <= 1) return;
  btn.closest('.proc-row').remove();
  renum();
}

function renum() {
  document.querySelectorAll('.proc-row .proc-num').forEach((el, i) => {
    el.textContent = i + 1;
  });
}

// ── LINE ITEMS ────────────────────────────────────────
function buildLIList() {
  const list = document.getElementById('li-list');
  if (!list.querySelector('.li-row')) addLI(false);
}

function addLI(focus = true) {
  const list = document.getElementById('li-list');
  const row = document.createElement('div');
  row.className = 'li-row';
  row.innerHTML = `
    <input class="li-input" type="text" placeholder="Concepto...">
    <input class="li-input c" type="number" value="1" min="1">
    <input class="li-input r" type="number" placeholder="0.00" min="0" step="0.01">
    <button class="btn-del" onclick="removeLI(this)">✕</button>`;
  row.querySelectorAll('input[type=number]').forEach(i => i.addEventListener('input', updateTotal));
  list.appendChild(row);
  if (focus) row.querySelector('input').focus();
}

function removeLI(btn) {
  const list = document.getElementById('li-list');
  if (list.querySelectorAll('.li-row').length <= 1) return;
  btn.closest('.li-row').remove();
  updateTotal();
}

function updateTotal() {
  let total = 0;
  document.querySelectorAll('.li-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    total += (parseFloat(inputs[1].value) || 0) * (parseFloat(inputs[2].value) || 0);
  });
  document.getElementById('running-total').textContent = fmtMXN(total);
}

// ── FORMAT ────────────────────────────────────────────
function fmtMXN(v) {
  return new Intl.NumberFormat('es-MX', { style:'currency', currency:'MXN' }).format(v || 0);
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── GENERATE REPORT ───────────────────────────────────
function generateReport() {
  folio++;
  try { localStorage.setItem('at_folio', String(folio)); } catch {}

  const folioStr = '#' + String(folio).padStart(4,'0');

  // Read data from DOM
  const data = {
    client:   document.getElementById('f-client').value,
    contact:  document.getElementById('f-contact').value,
    brand:    document.getElementById('f-brand').value,
    model:    document.getElementById('f-model').value,
    year:     document.getElementById('f-year').value,
    vin:      document.getElementById('f-vin').value,
    date:     document.getElementById('f-date').value,
    diag:     document.getElementById('f-diag').value,
    warranty: document.getElementById('f-warranty').value,
  };

  const procs = Array.from(document.querySelectorAll('.proc-input'))
    .map(i => i.value.trim()).filter(Boolean);

  const items = Array.from(document.querySelectorAll('.li-row')).map(row => {
    const inp = row.querySelectorAll('input');
    return {
      desc: inp[0].value,
      qty:  parseFloat(inp[1].value) || 1,
      price: parseFloat(inp[2].value) || 0
    };
  }).filter(i => i.desc.trim());

  document.getElementById('doc-out').innerHTML = buildDoc(data, procs, items, folioStr);
  document.getElementById('preview-folio').textContent = 'Folio ' + folioStr;

  document.getElementById('edit-view').style.display = 'none';
  document.getElementById('preview-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function backToEdit() {
  document.getElementById('preview-view').style.display = 'none';
  document.getElementById('edit-view').style.display = 'block';
  document.getElementById('folio-display').textContent = '#' + String(folio+1).padStart(4,'0');
  window.scrollTo(0, 0);
}

// ── BUILD DOCUMENT ────────────────────────────────────
function buildDoc(d, procs, items, folioStr) {
  const brandModel = [d.brand, d.model].filter(Boolean).join(' ') || '—';

  // Evidence grid
  let evHtml = '';
  for (let i = 0; i < 4; i++) {
    const lbl = esc(evLabels[i] || 'EVIDENCIA '+(i+1));
    evHtml += `<div class="ev-doc-slot">
      <div class="ev-doc-head">${lbl}</div>
      ${evImages[i]
        ? `<img class="ev-doc-img" src="${evImages[i]}" alt="${lbl}">`
        : `<div class="ev-doc-empty">Sin imagen</div>`}
    </div>`;
  }

  // Procedures
  const procsHtml = procs.map((p, i) =>
    `<div style="margin-bottom:4px">${i+1}. ${esc(p)}</div>`
  ).join('');

  // Line items
  let itemsHtml = '';
  let grand = 0;
  items.forEach((it, idx) => {
    const tot = it.qty * it.price;
    grand += tot;
    const bg = idx % 2 === 0 ? '#fff' : '#f8f9fa';
    itemsHtml += `<tr style="background:${bg}">
      <td>${esc(it.desc)}</td>
      <td style="text-align:center">${it.qty}</td>
      <td style="text-align:right">${fmtMXN(it.price)}</td>
      <td style="text-align:right">${fmtMXN(tot)}</td>
    </tr>`;
  });

  return `
  <!-- LOGO -->
  <div class="doc-logo">
    <svg width="88" height="32" viewBox="0 0 176 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 51 L16 37 Q26 15 62 12 L114 12 Q150 12 160 37 L163 51"
        stroke="#1a2340" stroke-width="3" stroke-linecap="round"/>
      <path d="M62 12 Q74 2 92 2 L114 2 Q136 2 146 12"
        stroke="#1a2340" stroke-width="3" stroke-linecap="round"/>
      <circle cx="48" cy="51" r="11" stroke="#1a2340" stroke-width="2.5" fill="none"/>
      <circle cx="128" cy="51" r="11" stroke="#1a2340" stroke-width="2.5" fill="none"/>
      <line x1="88" y1="12" x2="88" y2="44" stroke="#1a2340" stroke-width="1.5"/>
      <line x1="2" y1="62" x2="174" y2="62" stroke="#1a2340" stroke-width="1.5"/>
    </svg>
    <div class="doc-brand-name">AUTO<span class="t">TECH</span></div>
    <div class="doc-tagline">DIAGNÓSTICO &nbsp;•&nbsp; PROGRAMACIÓN &nbsp;•&nbsp; AUDIO PREMIUM &nbsp;•&nbsp; SEGURIDAD</div>
  </div>

  <div class="doc-title">REPORTE DE DIAGNÓSTICO Y COTIZACIÓN</div>

  <div class="doc-folio">
    Folio: <strong style="color:#333">${folioStr}</strong>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Fecha: <strong style="color:#333">${esc(d.date)}</strong>
  </div>

  <!-- S1 -->
  <div class="doc-block">
    <div class="doc-sec">1. Datos del Vehículo y Cliente</div>
    <div class="doc-grid2">
      <div><span class="lbl">Nombre del Cliente: </span><strong>${esc(d.client)||'—'}</strong></div>
      <div><span class="lbl">Año: </span><strong>${esc(d.year)||'—'}</strong></div>
      <div><span class="lbl">Marca / Modelo: </span><strong>${esc(brandModel)}</strong></div>
      <div><span class="lbl">VIN: </span><strong>${esc(d.vin)||'—'}</strong></div>
      <div><span class="lbl">Contacto: </span><strong>${esc(d.contact)||'—'}</strong></div>
    </div>
  </div>

  <!-- S2 -->
  <div class="doc-block">
    <div class="doc-sec">2. Diagnóstico Técnico &amp; Evidencias</div>
    ${d.diag ? `<p style="margin-bottom:10px;color:#333;line-height:1.6">${esc(d.diag)}</p>` : ''}
    <div class="ev-doc-grid">${evHtml}</div>
  </div>

  <!-- S3 -->
  ${procs.length ? `<div class="doc-block">
    <div class="doc-sec">3. Procedimientos Necesarios</div>
    ${procsHtml}
  </div>` : ''}

  <!-- S4 -->
  <div class="doc-block">
    <div class="doc-sec">4. Cotización de Reparación</div>
    <table class="doc-table">
      <thead>
        <tr>
          <th style="text-align:left">Descripción</th>
          <th style="text-align:center;width:66px">Cantidad</th>
          <th style="text-align:right;width:112px">Precio Unitario</th>
          <th style="text-align:right;width:112px">Total</th>
        </tr>
      </thead>
      <tbody>
        ${itemsHtml}
        <tr class="doc-total">
          <td colspan="3" style="text-align:right">Total General</td>
          <td style="text-align:right;font-size:12px">${fmtMXN(grand)}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- S5 -->
  <div class="doc-block">
    <div class="doc-sec">5. Resumen de Garantía</div>
    <p style="color:#444;line-height:1.6">${esc(d.warranty)}</p>
  </div>

  <!-- S6 -->
  <div class="doc-sig" style="margin-top:18px">
    <div>
      <div class="doc-sec" style="margin-bottom:22px">6. Autorización del Cliente:</div>
      <div class="sig-line" style="width:260px"></div>
      <div class="sig-cap">Firma del Cliente / Responsable</div>
    </div>
    <div style="text-align:right">
      <div class="sig-cap" style="margin-bottom:22px">Ciudad Victoria, Tamaulipas</div>
      <div class="sig-line" style="width:130px;margin-left:auto"></div>
      <div class="sig-cap">Fecha</div>
    </div>
  </div>`;
}
</script>
</body>
</html>
